<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#080808">

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Lift">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png">

  <title>Lift Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header id="appHeader">
    <div class="header-inner">
      <span class="app-name">LIFT</span>
      <span id="headerWeek" class="header-week"></span>
    </div>
  </header>

  <main id="app">
    <!-- Views render here -->
  </main>

  <nav id="bottomNav">
    <button data-nav="dashboard" onclick="navigate('dashboard')">
      <span class="nav-icon">⌂</span>
      <span class="nav-label">Home</span>
    </button>
    <button data-nav="log" onclick="navigate('log')">
      <span class="nav-icon">＋</span>
      <span class="nav-label">Log</span>
    </button>
    <button data-nav="history" onclick="navigate('history')">
      <span class="nav-icon">◷</span>
      <span class="nav-label">History</span>
    </button>
    <button data-nav="progress" onclick="navigate('progress')">
      <span class="nav-icon">↗</span>
      <span class="nav-label">Progress</span>
    </button>
    <button data-nav="program" onclick="navigate('program')">
      <span class="nav-icon">≡</span>
      <span class="nav-label">Program</span>
    </button>
  </nav>

  <script src="data/program.js"></script>
  <script src="app.js"></script>
</body>
</html>
